<!DOCTYPE html>
<html>
<head>
<title>AI Contract Assistant</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI";
  background: #0b1220;
  color: #e2e8f0;
}

.navbar {
  background: #020617;
  padding: 15px 25px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 25px;
}

.card {
  background: #111827;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 12px;
}

button {
  padding: 10px 18px;
  background: #6366f1;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

input {
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: none;
}

.result-box {
  margin-top: 15px;
  padding: 12px;
  background: #020617;
  border-radius: 8px;
}

/* TAGS */
.tag {
  display: inline-block;
  padding: 5px 10px;
  border-radius: 6px;
  margin-right: 5px;
}
.good { background: #16a34a; }
.warn { background: #eab308; color:black; }
.bad { background: #dc2626; }

/* CHAT UI */
.chat-box {
  margin-top: 15px;
  padding: 10px;
  background: #020617;
  border-radius: 8px;
  height: 250px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.msg {
  max-width: 70%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 12px;
  font-size: 14px;
}

.user {
  background: #6366f1;
  align-self: flex-end;
}

.bot {
  background: #1f2937;
  align-self: flex-start;
}
</style>
</head>

<body>

<div class="navbar">🚗 AI Contract Assistant</div>

<div class="container">

<!-- ANALYZE -->
<div class="card">
<h2>📄 Analyze Contract</h2>
<input type="file" id="file"><br>
<button onclick="analyze()">🔍 Analyze Contract</button>
<div id="result" class="result-box"></div>
</div>

<!-- COMPARE -->
<div class="card">
<h2>⚖️ Compare Contracts</h2>
<input type="file" id="file1"><br>
<input type="file" id="file2"><br>
<button onclick="compare()">📊 Compare</button>
<div id="compareResult" class="result-box"></div>
</div>

<!-- CHAT -->
<div class="card">
<h2>💬 Chat Assistant (Analyze contract first)</h2>
<input type="text" id="chatInput" placeholder="Ask about APR, risk...">
<button onclick="chat()">🤖 Ask</button>

<div id="chatBox" class="chat-box"></div>
</div>

</div>

<script>

function verdictTag(verdict) {
  if (verdict === "Good Deal") {
    return '<span class="tag good">✅ Good</span>';
  } else if (verdict === "Proceed with Caution") {
    return '<span class="tag warn">⚠️ Caution</span>';
  } else {
    return '<span class="tag bad">❌ Risky</span>';
  }
}

async function analyze() {
  let f = document.getElementById("file").files[0];
  if (!f) return alert("⚠️ Please upload a contract");

  let fd = new FormData();
  fd.append("file", f);

  let res = await fetch("http://127.0.0.1:8000/analyze/", {
    method: "POST",
    body: fd
  });

  let d = await res.json();

  document.getElementById("result").innerHTML = `
    <h3>📊 Analysis Result</h3>
    <p>⭐ <b>Score:</b> ${d.analysis.score}</p>
    <p>📉 <b>Risk:</b> ${d.analysis.risk_percent}% (${d.analysis.risk_level})</p>
    <p>🏁 <b>Verdict:</b> ${verdictTag(d.analysis.verdict)}</p>
    <p>🧠 <b>Guide:</b> ${d.analysis.decision_guide}</p>

    <hr>

    <p>⚠️ <b>Reasons:</b><br>
    ${d.analysis.reasons.map(r => "• " + r).join("<br>")}</p>

    <p>💡 <b>Suggestions:</b><br>
    ${d.analysis.suggestions.map(s => "✔ " + s).join("<br>")}</p>

    <p>🚨 <b>Red Flags:</b><br>
    ${d.red_flags.map(f => "🔴 " + f).join("<br>")}</p>
  `;
}

async function compare() {
  let f1 = document.getElementById("file1").files[0];
  let f2 = document.getElementById("file2").files[0];

  if (!f1 || !f2) return alert("⚠️ Upload both contracts");

  let fd = new FormData();
  fd.append("file1", f1);
  fd.append("file2", f2);

  let res = await fetch("http://127.0.0.1:8000/compare/", {
    method: "POST",
    body: fd
  });

  let d = await res.json();

  document.getElementById("compareResult").innerHTML = `
    <h3>📊 Comparison Result</h3>
    <p>🏆 <b>Better:</b> ${d.better}</p>
    <p>📌 <b>Reason:</b> ${d.reason}</p>
  `;
}

async function chat() {
  let input = document.getElementById("chatInput");
  let message = input.value;

  if (!message) {
    return alert("⚠️ Please enter a question");
  }

  let chatBox = document.getElementById("chatBox");

  // USER MESSAGE
  let userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.innerText = message;
  chatBox.appendChild(userMsg);

  chatBox.scrollTop = chatBox.scrollHeight;

  let fd = new FormData();
  fd.append("query", message);

  let res = await fetch("http://127.0.0.1:8000/chat/", {
    method: "POST",
    body: fd
  });

  let d = await res.json();

  // BOT MESSAGE
  let botMsg = document.createElement("div");
  botMsg.className = "msg bot";
  botMsg.innerText = d.response;
  chatBox.appendChild(botMsg);

  chatBox.scrollTop = chatBox.scrollHeight;

  input.value = "";
}

// ENTER KEY SUPPORT
document.getElementById("chatInput")
  .addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      chat();
    }
});

</script>

</body>
</html>
